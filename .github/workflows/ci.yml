
name: x86_64 OS CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Debug
        run: echo "CI IS RUNNING"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            nasm clang lld qemu-system-x86

      - name: Build OS
        run: ./build.sh build

      - name: Verify outputs exist
        run: |
          test -f build/kernel.bin || test -f build/boot.bin 
          test -f build/OS

      - name: Boot test in QEMU
        run: |
          mkdir -p test-output

          if [ -f build/OS ]; then
            timeout 20s qemu-system-x86_64 \
              -enable-kvm \
              -cpu host,+apic,-x2apic \
              -smp 8,sockets=1,cores=4,threads=2,maxcpus=8 \
              -hda build/OS \
              -monitor stdio \
              -serial file:serial.log \
              -no-reboot \
              -m 16G
          else
            echo "No bootable image found"
            exit 1
          fi

      - name: Check boot log for success message
        run: |
          test -f test-output/serial.log
          grep -q "KERNEL OK" test-output/serial.log

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: os-build
          path: |
            build/**
            test-output/**

